name: Workflow d’initiation

on: [push]

jobs:
  saluer-le-monde:
    runs-on: ubuntu-latest

    steps:
      - name: Dire bonjour
        run: echo "Bonjour depuis GitHub Actions !"

      - name: Afficher la date du jour
        run: date

      - name: Afficher l'acteur GitHub
        run: echo ${{ github.actor }}